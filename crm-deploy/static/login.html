<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Vendedores — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .logo {
      font-size: 48px;
      margin-bottom: 8px;
      text-align: center;
    }
    h1 {
      font-size: 22px;
      color: #1a1a1a;
      text-align: center;
      margin-bottom: 4px;
    }
    .subtitulo {
      color: #888;
      font-size: 14px;
      text-align: center;
      margin-bottom: 28px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 28px 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 380px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #555;
      font-weight: 600;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    select, input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      color: #1a1a1a;
      background: white;
      margin-bottom: 18px;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    select:focus, input:focus {
      outline: none;
      border-color: #1a73e8;
    }
    input[type="password"] {
      letter-spacing: 6px;
      font-size: 20px;
    }
    input::placeholder { letter-spacing: 0; font-size: 15px; color: #bbb; }
    button {
      width: 100%;
      padding: 16px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:active { background: #1558b0; }
    button:disabled { background: #b0c4e8; cursor: not-allowed; }
    .error {
      background: #ffebee;
      color: #c62828;
      border: 1px solid #ef9a9a;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 14px;
      margin-top: 14px;
      display: none;
    }
    .loading { color: #888; font-size: 14px; text-align: center; padding: 10px 0; }
  </style>
</head>
<body>

<div class="logo">📍</div>
<h1>CRM Vendedores</h1>
<p class="subtitulo">Registro de visitas a clientes</p>

<div class="card">
  <div id="cargando" class="loading">Cargando vendedores...</div>

  <form id="form-login" style="display:none" onsubmit="iniciarSesion(event)">
    <label for="sel-vendedor">Tu nombre</label>
    <select id="sel-vendedor" required>
      <option value="">— Selecciona —</option>
    </select>

    <label for="inp-pin">PIN (4 dígitos)</label>
    <input id="inp-pin" type="password" inputmode="numeric"
           maxlength="4" placeholder="••••" required autocomplete="off">

    <button type="submit" id="btn-login">Entrar</button>
    <div class="error" id="error-msg"></div>
  </form>
</div>

<script>
  // Cargar lista de vendedores al iniciar
  fetch("/api/vendedores")
    .then(r => r.json())
    .then(vendedores => {
      const sel = document.getElementById("sel-vendedor");
      vendedores.forEach(v => {
        const opt = document.createElement("option");
        opt.value = v.id;
        opt.textContent = `${v.nombre}${v.zona ? " — " + v.zona : ""}`;
        sel.appendChild(opt);
      });
      document.getElementById("cargando").style.display = "none";
      document.getElementById("form-login").style.display = "block";
    })
    .catch(() => {
      document.getElementById("cargando").textContent =
        "Error al conectar con el servidor. ¿Está corriendo app.py?";
    });

  async function iniciarSesion(e) {
    e.preventDefault();
    const btn = document.getElementById("btn-login");
    const errorDiv = document.getElementById("error-msg");
    const vendedor_id = parseInt(document.getElementById("sel-vendedor").value);
    const pin = document.getElementById("inp-pin").value;

    btn.disabled = true;
    btn.textContent = "Verificando...";
    errorDiv.style.display = "none";

    try {
      const resp = await fetch("/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ vendedor_id, pin })
      });

      if (!resp.ok) {
        const err = await resp.json();
        throw new Error(err.detail || "Error al iniciar sesión");
      }

      const datos = await resp.json();
      localStorage.setItem("token",       datos.token);
      localStorage.setItem("nombre",      datos.nombre);
      localStorage.setItem("vendedor_id", datos.vendedor_id);
      window.location.href = "/static/vendedor.html";

    } catch (err) {
      errorDiv.textContent = "❌ " + err.message;
      errorDiv.style.display = "block";
      btn.disabled = false;
      btn.textContent = "Entrar";
      document.getElementById("inp-pin").value = "";
      document.getElementById("inp-pin").focus();
    }
  }
</script>
</body>
</html>
